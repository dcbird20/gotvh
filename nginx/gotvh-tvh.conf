# GoTVH + TVHeadend reverse proxy
#
# Usage summary:
# 1) Start GoTVH dev server on 127.0.0.1:4200
# 2) Ensure TVHeadend is on 127.0.0.1:9981
# 3) Include this file from nginx.conf http{} or sites-enabled
# 4) Access app via http://127.0.0.1:8080

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080;
    server_name 127.0.0.1 localhost;

    # Large stream connections should not be buffered or cut off early.
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Keep live streams alive.
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    send_timeout 3600s;

    # TVHeadend API + streaming endpoints
    location ~ ^/(api|stream|play|xmltv)(/|$) {
        # Optional CORS handling (useful when tools hit this host cross-origin)
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials true always;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;

        # Preserve Authorization passed by GoTVH.
        proxy_set_header Authorization $http_authorization;

        proxy_pass http://127.0.0.1:9981;
    }

    # Angular dev server and HMR/socket traffic
    location / {
        proxy_pass http://127.0.0.1:4200;
    }
}
