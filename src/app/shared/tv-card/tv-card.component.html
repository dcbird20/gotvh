<div class="tv-card">
  <span class="tv-card__badge" *ngIf="badge">{{ badge }}</span>

  <div class="tv-card__number" *ngIf="channelNumber">{{ channelNumber }}</div>
  <div class="tv-card__title">{{ title }}</div>
  <div class="tv-card__subtitle" *ngIf="subtitle">{{ subtitle }}</div>
  <div class="tv-card__meta" *ngIf="meta">{{ meta }}</div>
</div>
