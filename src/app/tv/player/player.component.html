<div class="player-screen">
  <header class="player-screen__header">
    <div>
      <div class="player-screen__eyebrow">Live Playback</div>
      <h1 class="player-screen__title">{{ channelName }}</h1>
    </div>

    <div class="player-screen__actions">
      <button class="tv-btn" type="button" tvFocusable (click)="goBack()">← Back</button>
      <button class="tv-btn" type="button" tvFocusable (click)="openExternal()">Open Raw Stream</button>
      <button class="tv-btn" type="button" tvFocusable (click)="openInVLC()" *ngIf="hasAc3Audio">🎬 Open in VLC</button>
    </div>
  </header>

  <div class="player-screen__viewport">
    <video
      *ngIf="!isCapacitorNative()"
      #playerVideo
      class="player-screen__video"
      controls
      autoplay
      muted
      playsinline
      (error)="onVideoError()"
    ></video>
  </div>

  <ng-container *ngIf="!isCapacitorNative()">
  <section class="player-screen__transports">
    <div class="player-screen__transports-copy">
      <h2 class="player-screen__transports-title">Transport Mode</h2>
      <p class="player-screen__transports-text">Switch between direct TVHeadend fetches, the Angular proxy path, and native raw playback without leaving the player.</p>
    </div>

    <div class="player-screen__transport-actions">
      <button
        class="tv-btn player-screen__transport-btn"
        type="button"
        tvFocusable
        [class.player-screen__transport-btn--active]="isTransportSelected('direct')"
        (click)="selectTransport('direct')"
      >
        Direct
      </button>
      <button
        class="tv-btn player-screen__transport-btn"
        type="button"
        tvFocusable
        [class.player-screen__transport-btn--active]="isTransportSelected('proxy')"
        (click)="selectTransport('proxy')"
      >
        Proxy
      </button>
      <button
        class="tv-btn player-screen__transport-btn"
        type="button"
        tvFocusable
        [class.player-screen__transport-btn--active]="isTransportSelected('native')"
        (click)="selectTransport('native')"
      >
        Native / Raw
      </button>
    </div>
  </section>

  <section class="player-screen__autoplay-gate" *ngIf="awaitingNativeInteraction">
    <p class="player-screen__health-text">Autoplay was blocked by the device. Press this button to start the stream.</p>
    <button class="tv-btn" type="button" tvFocusable (click)="startPlaybackAfterInteraction()">Start Playback</button>

  <p class="player-screen__error" *ngIf="playerError">⚠️ {{ playerError }}</p>
